name: good_news
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+19

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  dio: ^5.3.4
  package_info_plus: ^8.0.0
  flutter_dotenv: ^5.1.0
  tcard: ^1.3.5
  app_settings: ^6.1.1
  crypto: ^3.0.3
  shared_preferences: ^2.0.15
  url_launcher: ^6.2.5
  flutter_html: ^3.0.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  visibility_detector: ^0.4.0+2
  flutter_card_swiper: ^7.0.2
  share_plus: ^12.0.0
  intl: ^0.20.2
  mime: ^2.0.0
  http_parser: ^4.1.2
  http: ^1.5.0
  timeago: ^3.7.1
  lottie: ^3.0.0
  connectivity_plus: ^6.1.0
  provider: ^6.1.2
  youtube_player_flutter: ^9.1.1
  google_sign_in: ^6.1.5
  shimmer: ^3.0.0
  flutter_secure_storage: ^9.2.2  # Token encryption
  device_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/videos/
    - assets/splash_animation.json
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/new_logo_goodnews.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/new_logo_goodnews.png"
